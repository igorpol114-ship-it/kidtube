<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light only">
<title>KateTube</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { color-scheme: light only; }
  html, body { background: #F5F7FF !important; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: #23283B;
    min-height: 100vh;
  }

  /* ── Шапка (стиль YouTube) ── */
  header {
    position: sticky; top: 0; z-index: 20;
    background: #fff;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 0 rgba(0,0,0,.08);
  }
  .logo {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Roboto', 'Nunito', sans-serif;
    font-size: 21px; font-weight: 700; color: #0F0F0F;
    letter-spacing: -0.045em; margin-right: auto;
  }
  .yt-badge {
    width: 34px; height: 24px; background: #FF0000; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; font-weight: 900; line-height: 1;
  }
  .hbtn {
    border: none; background: #F2F2F2; color: #0F0F0F;
    border-radius: 999px; padding: 9px 13px; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .hbtn:active { background: #E0E0E0; }

  /* ── Фільтр каналів ── */
  .chips {
    display: flex; gap: 8px; padding: 12px 16px 4px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .chip {
    flex-shrink: 0; border: 2px solid #E3E7F5; background: #fff;
    border-radius: 999px; padding: 8px 16px;
    font-family: inherit; font-size: 14px; font-weight: 700; color: #23283B;
    cursor: pointer; white-space: nowrap;
  }
  .chip.on { background: #4C6FFF; border-color: #4C6FFF; color: #fff; }

  /* ── Сітка відео ── */
  .grid {
    display: grid; grid-template-columns: 1fr; gap: 16px;
    padding: 14px 16px 40px; max-width: 760px; margin: 0 auto;
  }
  @media (min-width: 560px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: #fff; border-radius: 18px; overflow: hidden;
    box-shadow: 0 6px 20px rgba(35,40,59,.08);
    cursor: pointer; transition: transform .1s;
  }
  .card:active { transform: scale(.97); }
  .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #E3E7F5; }
  .card-body { padding: 12px 14px 14px; }
  .card-title {
    font-size: 15px; font-weight: 800; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta { margin-top: 6px; font-size: 12.5px; font-weight: 700; color: #8A90A8; }

  .status { text-align: center; padding: 40px 20px; color: #8A90A8; font-weight: 700; }

  /* ── Плеєр ── */
  .player {
    position: fixed; inset: 0; z-index: 50; background: #0B0E1A;
    display: none; flex-direction: column;
  }
  .player.open { display: flex; }
  .player-top {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px calc(10px);
  }
  .back {
    border: none; background: rgba(255,255,255,.14); color: #fff;
    border-radius: 12px; padding: 10px 18px;
    font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer;
  }
  .player-title { color: #fff; font-size: 14px; font-weight: 700; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .frame-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 0 20px; }
  .frame-wrap iframe { width: 100%; max-width: 900px; aspect-ratio: 16/9; border: none; }
  .video-box { position: relative; width: 100%; max-width: 900px; }
  .pause-cover {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(11,14,26,.95);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    border-radius: 12px; padding: 12px; overflow: hidden;
  }
  .pause-cover.show { display: flex; }
  .cover-top { display: flex; align-items: center; gap: 14px; }
  .big-play {
    border: none; background: #FF0000; color: #fff;
    width: 64px; height: 64px; border-radius: 50%; font-size: 26px;
    cursor: pointer; box-shadow: 0 8px 30px rgba(255,0,0,.4); flex-shrink: 0;
  }
  .cover-text { color: #fff; font-weight: 800; font-size: 16px; }
  .cover-back {
    border: none; background: rgba(255,255,255,.16); color: #fff;
    border-radius: 12px; padding: 10px 16px;
    font-family: inherit; font-size: 14px; font-weight: 800; cursor: pointer; flex-shrink: 0;
  }
  .suggest-title { color: rgba(255,255,255,.75); font-weight: 800; font-size: 13px; align-self: flex-start; }
  .suggest-row {
    display: flex; gap: 10px; width: 100%;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .s-card {
    flex: 0 0 150px; background: #1B2032; border-radius: 12px; overflow: hidden;
    cursor: pointer;
  }
  .s-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .s-card .s-name {
    color: #fff; font-size: 12px; font-weight: 700; line-height: 1.3;
    padding: 7px 9px 9px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── Батьківський режим ── */
  .modal {
    position: fixed; inset: 0; z-index: 60; background: rgba(11,14,26,.55);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: #fff; border-radius: 22px 22px 0 0; width: 100%; max-width: 560px;
    padding: 22px 20px calc(26px + env(safe-area-inset-bottom));
    max-height: 85vh; overflow-y: auto;
  }
  .modal-card h2 { font-size: 19px; font-weight: 800; margin-bottom: 14px; }
  .pin-row { display: flex; gap: 10px; }
  input[type="password"], input[type="text"] {
    flex: 1; border: 2px solid #E3E7F5; border-radius: 12px; padding: 12px 14px;
    font-family: inherit; font-size: 16px; font-weight: 700; outline: none; width: 100%;
  }
  input:focus { border-color: #4C6FFF; }
  .btn {
    border: none; background: #4C6FFF; color: #fff; border-radius: 12px;
    padding: 12px 18px; font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
  }
  .btn.gray { background: #E3E7F5; color: #23283B; }
  .btn.red { background: #FF5B7F; }
  .ch-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid #EEF0F8;
  }
  .ch-name { font-weight: 800; font-size: 15px; margin-right: auto; }
  .hint { font-size: 12.5px; color: #8A90A8; font-weight: 700; margin: 8px 0 14px; line-height: 1.5; }
  .add-row { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .err { color: #FF5B7F; font-weight: 800; font-size: 14px; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="yt-badge">K</span>KateTube</div>
  <button class="hbtn" id="refreshBtn">↻</button>
  <button class="hbtn" id="parentBtn">🔒</button>
</header>

<div class="chips" id="chips"></div>
<div class="grid" id="grid"></div>
<div class="status" id="status">Завантажую відео… ⏳</div>

<!-- Плеєр -->
<div class="player" id="player">
  <div class="player-top">
    <button class="back" id="backBtn">← Назад</button>
    <div class="player-title" id="playerTitle"></div>
  </div>
  <div class="frame-wrap">
    <div class="video-box">
      <div id="frameHost"></div>
      <div class="pause-cover" id="pauseCover">
        <div class="cover-top">
          <button class="big-play" id="resumeBtn">▶</button>
          <div class="cover-text" id="coverText">Пауза</div>
          <button class="cover-back" id="coverBack">← Список</button>
        </div>
        <div class="suggest-title">Подивись ще 👇</div>
        <div class="suggest-row" id="suggestRow"></div>
      </div>
    </div>
  </div>
</div>

<!-- Батьківський режим -->
<div class="modal" id="modal">
  <div class="modal-card">
    <!-- Екран PIN -->
    <div id="pinScreen">
      <h2>🔒 Для батьків</h2>
      <div class="hint">Введи PIN-код (початковий: 1111 — зміни його всередині)</div>
      <div class="pin-row">
        <input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="PIN">
        <button class="btn" id="pinOk">Увійти</button>
        <button class="btn gray" id="pinCancel">✕</button>
      </div>
      <div class="err" id="pinErr"></div>
    </div>
    <!-- Екран налаштувань -->
    <div id="settingsScreen" style="display:none;">
      <h2>⚙️ Дозволені канали</h2>
      <div id="chList"></div>
      <div class="add-row">
        <input type="text" id="newChId" placeholder="ID каналу (UC…) або посилання">
        <input type="text" id="newChName" placeholder="Назва (як показувати дитині)">
        <button class="btn" id="addCh">+ Додати канал</button>
        <div class="err" id="addErr"></div>
      </div>
      <div class="hint">Де взяти ID: відкрий канал на YouTube → «…про канал» → Поділитися → Копіювати ID каналу. Або просто встав посилання виду youtube.com/channel/UC…</div>
      <div class="add-row">
        <input type="password" id="newPin" inputmode="numeric" maxlength="6" placeholder="Новий PIN (4-6 цифр)">
        <button class="btn gray" id="savePin">Змінити PIN</button>
      </div>
      <div class="add-row">
        <button class="btn red" id="closeSettings">Готово — закрити</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Дані ───────────────────────────────────────────────────────
const DEFAULT_CHANNELS = [
  { id: "UCX6OQ3DkcsbYNE6H8uQQuVA", name: "MrBeast" },
  { id: "UCRkuUgtDAL4XSU5jB40J_wA", name: "Foltyn" },
  { id: "UCja7QUMRG9AD8X2F_vXFb9A", name: "Royalty Family" },
];

function loadChannels() {
  try {
    const raw = localStorage.getItem("kt_channels");
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length) return arr; }
  } catch (e) {}
  return DEFAULT_CHANNELS.slice();
}
function saveChannels() { localStorage.setItem("kt_channels", JSON.stringify(channels)); }
function loadPin() { return localStorage.getItem("kt_pin") || "1111"; }

let channels = loadChannels();
let videos = [];
let filter = "all";

// ─── Завантаження RSS ───────────────────────────────────────────
const PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
];

async function fetchFeed(channelId) {
  const feedUrl = "https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId;
  let lastErr;
  for (const wrap of PROXIES) {
    try {
      const r = await fetch(wrap(feedUrl));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const text = await r.text();
      if (!text.includes("<feed")) throw new Error("Не XML");
      return text;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("Feed failed");
}

function parseFeed(xmlText, channelId, channelName) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const entries = Array.from(doc.getElementsByTagName("entry"));
  return entries.map(en => {
    const get = tag => { const n = en.getElementsByTagName(tag)[0]; return n ? n.textContent : ""; };
    const vid = get("yt:videoId") || (en.getElementsByTagNameNS("*","videoId")[0]||{}).textContent || "";
    const thumbNode = en.getElementsByTagNameNS("*","thumbnail")[0];
    return {
      id: vid,
      title: get("title"),
      published: new Date(get("published")).getTime() || 0,
      thumb: thumbNode ? thumbNode.getAttribute("url") : ("https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg"),
      channelId, channelName,
    };
  }).filter(v => v.id);
}

async function loadAll() {
  const grid = document.getElementById("grid");
  const status = document.getElementById("status");
  grid.innerHTML = "";
  status.style.display = "block";
  status.textContent = "Завантажую відео… ⏳";
  videos = [];
  const results = await Promise.allSettled(
    channels.map(async ch => parseFeed(await fetchFeed(ch.id), ch.id, ch.name))
  );
  const failed = [];
  results.forEach((r, i) => {
    if (r.status === "fulfilled") videos.push(...r.value);
    else failed.push(channels[i].name);
  });
  videos.sort((a, b) => b.published - a.published);
  if (!videos.length) {
    status.textContent = "Не вдалося завантажити відео 😕 Спробуй кнопку ↻ або перевір інтернет.";
    return;
  }
  status.style.display = "none";
  if (failed.length) console.warn("Не завантажились:", failed.join(", "));
  renderChips();
  renderGrid();
}

// ─── Рендер ─────────────────────────────────────────────────────
function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 86400000);
  if (d < 1) return "сьогодні";
  if (d === 1) return "вчора";
  if (d < 7) return d + " дн. тому";
  if (d < 30) return Math.floor(d / 7) + " тиж. тому";
  if (d < 365) return Math.floor(d / 30) + " міс. тому";
  return Math.floor(d / 365) + " р. тому";
}

function renderChips() {
  const box = document.getElementById("chips");
  box.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (filter === "all" ? " on" : "");
  all.textContent = "⭐ Усі";
  all.onclick = () => { filter = "all"; renderChips(); renderGrid(); };
  box.appendChild(all);
  channels.forEach(ch => {
    const b = document.createElement("button");
    b.className = "chip" + (filter === ch.id ? " on" : "");
    b.textContent = ch.name;
    b.onclick = () => { filter = ch.id; renderChips(); renderGrid(); };
    box.appendChild(b);
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const list = filter === "all" ? videos : videos.filter(v => v.channelId === filter);
  list.slice(0, 60).forEach(v => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<img class="thumb" loading="lazy" src="' + v.thumb + '">' +
      '<div class="card-body"><div class="card-title"></div>' +
      '<div class="card-meta">' + v.channelName + " • " + timeAgo(v.published) + "</div></div>";
    card.querySelector(".card-title").textContent = v.title;
    card.onclick = () => openPlayer(v);
    grid.appendChild(card);
  });
}

// ─── Плеєр (YouTube IFrame API + захисна шторка) ────────────────
let ytReady = false, ytPlayer = null, pendingVideo = null;
const tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = () => {
  ytReady = true;
  if (pendingVideo) { const v = pendingVideo; pendingVideo = null; startVideo(v); }
};

const pauseCover = document.getElementById("pauseCover");
const coverText = document.getElementById("coverText");
let currentVideo = null;

function buildSuggestions(cur) {
  const row = document.getElementById("suggestRow");
  row.innerHTML = "";
  if (!cur) return;
  // Спершу свіже з того ж каналу, потім з інших — усе тільки з наших дозволених
  const same = videos.filter(v => v.channelId === cur.channelId && v.id !== cur.id);
  const other = videos.filter(v => v.channelId !== cur.channelId);
  const picks = same.slice(0, 2).concat(other.slice(0, 4)).slice(0, 4);
  picks.forEach(v => {
    const c = document.createElement("div");
    c.className = "s-card";
    c.innerHTML = '<img loading="lazy" src="' + v.thumb + '"><div class="s-name"></div>';
    c.querySelector(".s-name").textContent = v.title;
    c.onclick = () => {
      pauseCover.classList.remove("show");
      document.getElementById("playerTitle").textContent = v.title;
      startVideo(v);
    };
    row.appendChild(c);
  });
}

function openPlayer(v) {
  document.getElementById("playerTitle").textContent = v.title;
  document.getElementById("player").classList.add("open");
  pauseCover.classList.remove("show");
  if (!ytReady) { pendingVideo = v; return; }
  startVideo(v);
}

function startVideo(v) {
  currentVideo = v;
  buildSuggestions(v);
  if (ytPlayer) { try { ytPlayer.destroy(); } catch (e) {} ytPlayer = null; }
  document.getElementById("frameHost").innerHTML = '<div id="ytTarget"></div>';
  ytPlayer = new YT.Player("ytTarget", {
    videoId: v.id,
    width: "100%",
    playerVars: { rel: 0, playsinline: 1, modestbranding: 1, autoplay: 1, fs: 1 },
    events: {
      onReady: e => e.target.playVideo(),
      onStateChange: e => {
        // 2 = пауза, 0 = кінець: накриваємо плеєр шторкою,
        // щоб дитина не бачила список "інших відео" від YouTube
        if (e.data === YT.PlayerState.PAUSED) {
          coverText.textContent = "Пауза";
          pauseCover.classList.add("show");
        } else if (e.data === YT.PlayerState.ENDED) {
          coverText.textContent = "Відео закінчилось 🎉";
          pauseCover.classList.add("show");
        } else {
          pauseCover.classList.remove("show");
        }
      },
    },
  });
  // Плеєр вставляє iframe — надамо йому правильні пропорції
  setTimeout(() => {
    const ifr = document.querySelector("#frameHost iframe");
    if (ifr) { ifr.style.width = "100%"; ifr.style.aspectRatio = "16/9"; ifr.style.borderRadius = "12px"; ifr.style.border = "none"; }
  }, 400);
}

function closePlayer() {
  if (ytPlayer) { try { ytPlayer.destroy(); } catch (e) {} ytPlayer = null; }
  document.getElementById("frameHost").innerHTML = "";
  pauseCover.classList.remove("show");
  document.getElementById("player").classList.remove("open");
}

document.getElementById("backBtn").onclick = closePlayer;
document.getElementById("coverBack").onclick = closePlayer;
document.getElementById("resumeBtn").onclick = () => {
  if (ytPlayer && coverText.textContent.includes("Пауза")) {
    pauseCover.classList.remove("show");
    ytPlayer.playVideo();
  } else if (ytPlayer) {
    pauseCover.classList.remove("show");
    ytPlayer.seekTo(0);
    ytPlayer.playVideo();
  }
};

// ─── Батьківський режим ─────────────────────────────────────────
const modal = document.getElementById("modal");
const pinScreen = document.getElementById("pinScreen");
const settingsScreen = document.getElementById("settingsScreen");

document.getElementById("parentBtn").onclick = () => {
  modal.classList.add("open");
  pinScreen.style.display = "block";
  settingsScreen.style.display = "none";
  document.getElementById("pinInput").value = "";
  document.getElementById("pinErr").textContent = "";
};
document.getElementById("pinCancel").onclick = () => modal.classList.remove("open");
document.getElementById("pinOk").onclick = () => {
  if (document.getElementById("pinInput").value === loadPin()) {
    pinScreen.style.display = "none";
    settingsScreen.style.display = "block";
    renderChannelList();
  } else {
    document.getElementById("pinErr").textContent = "Невірний PIN";
  }
};

function renderChannelList() {
  const box = document.getElementById("chList");
  box.innerHTML = "";
  channels.forEach((ch, i) => {
    const row = document.createElement("div");
    row.className = "ch-row";
    const name = document.createElement("div");
    name.className = "ch-name";
    name.textContent = ch.name;
    const del = document.createElement("button");
    del.className = "btn red";
    del.textContent = "Видалити";
    del.onclick = () => {
      if (channels.length === 1) { alert("Має лишитися хоча б один канал"); return; }
      channels.splice(i, 1); saveChannels(); renderChannelList();
    };
    row.appendChild(name); row.appendChild(del);
    box.appendChild(row);
  });
}

function extractChannelId(input) {
  input = input.trim();
  const m = input.match(/UC[A-Za-z0-9_-]{22}/);
  return m ? m[0] : null;
}

document.getElementById("addCh").onclick = async () => {
  const err = document.getElementById("addErr");
  err.textContent = "";
  const id = extractChannelId(document.getElementById("newChId").value);
  let name = document.getElementById("newChName").value.trim();
  if (!id) { err.textContent = "Не бачу ID каналу (має починатися з UC…)"; return; }
  if (channels.some(c => c.id === id)) { err.textContent = "Цей канал уже додано"; return; }
  err.textContent = "Перевіряю канал…";
  try {
    const xml = await fetchFeed(id);
    if (!name) {
      const doc = new DOMParser().parseFromString(xml, "text/xml");
      const t = doc.getElementsByTagName("title")[0];
      name = t ? t.textContent : id;
    }
    channels.push({ id, name });
    saveChannels();
    renderChannelList();
    document.getElementById("newChId").value = "";
    document.getElementById("newChName").value = "";
    err.textContent = "";
  } catch (e) {
    err.textContent = "Канал не знайдено або немає зв'язку";
  }
};

document.getElementById("savePin").onclick = () => {
  const p = document.getElementById("newPin").value.trim();
  if (!/^\d{4,6}$/.test(p)) { alert("PIN — 4-6 цифр"); return; }
  localStorage.setItem("kt_pin", p);
  document.getElementById("newPin").value = "";
  alert("PIN змінено ✓");
};

document.getElementById("closeSettings").onclick = () => {
  modal.classList.remove("open");
  loadAll();
};

document.getElementById("refreshBtn").onclick = loadAll;

// ─── Старт ──────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
